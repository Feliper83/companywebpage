name: Run DB script (manual)

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script a correr dentro de src/server (ej: create-blog-retail.js)'
        required: true
        default: 'create-blog-retail.js'

permissions:
  contents: read

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/server/package-lock.json

      - name: Install backend dependencies
        working-directory: src/server
        run: npm ci

      - name: Run script
        working-directory: src/server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node "${{ github.event.inputs.script }}"
